name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild \
            -project NoFunctionDemoApp.xcodeproj \
            -scheme NoFunctionDemoApp \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO
